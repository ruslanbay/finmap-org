<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/finmap-org/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinMap.org - Interactive Financial Market Visualization</title>
    <meta name="description" content="Visualize financial markets with interactive treemaps and histograms. Explore stocks, ETFs, and market data in real-time." />
    <script type="module" crossorigin src="/finmap-org/assets/index-B2kj5B1y.js"></script>
    <link rel="modulepreload" crossorigin href="/finmap-org/assets/d3-IuWckZMa.js">
    <link rel="stylesheet" crossorigin href="/finmap-org/assets/index-PkogcXl3.css">
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="header-content">
          <h1 class="logo">FinMap.org</h1>
          <nav class="nav">
            <div class="nav-controls">
              <select id="exchangeSelector" class="exchange-selector">
                <option value="nasdaq">NASDAQ</option>
                <option value="nyse">NYSE</option>
                <option value="moex">MOEX</option>
                <option value="lse">LSE</option>
              </select>
              <input type="search" id="searchBox" placeholder="Search securities..." class="search-box" />
            </div>
          </nav>
        </div>
      </header>

      <main class="main-content">
        <div class="controls-panel">
          <div class="chart-controls">
            <div class="control-group">
              <label for="chartType">Chart Type:</label>
              <select id="chartType" class="chart-type-selector">
                <option value="treemap">Treemap</option>
                <option value="histogram">Histogram</option>
              </select>
            </div>

            <div class="control-group">
              <label for="dataType">Data Type:</label>
              <select id="dataType" class="data-type-selector">
                <option value="marketcap">Market Cap</option>
                <option value="value">Value</option>
                <option value="trades">Trades</option>
              </select>
            </div>

            <div class="control-group">
              <button id="refreshBtn" class="refresh-btn">Refresh Data</button>
            </div>
          </div>
        </div>

        <div class="chart-container" id="chartContainer">
          <div class="loading-spinner" id="loadingSpinner">
            Loading market data...
          </div>
        </div>

        <div class="info-panel" id="infoPanel">
          <div class="market-summary">
            <h3>Market Summary</h3>
            <div id="marketStats" class="market-stats">
              <!-- Market statistics will be populated here -->
            </div>
          </div>
        </div>
      </main>

      <footer class="footer">
        <div class="footer-content">
          <p>&copy; 2025 FinMap.org - Open Source Financial Visualization</p>
          <div class="footer-links">
            <a href="https://github.com/finmap-org" target="_blank">GitHub</a>
            <a href="#about">About</a>
            <a href="#api">API</a>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
