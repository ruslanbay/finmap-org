<!DOCTYPE html>
<html>

<head>
  <title>D3.js Treemap</title>
  <style>
    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #tooltip {
      position: absolute;
      padding: 8px;
      background: rgba(0, 0, 0, 0.8);
      color: white;
      border-radius: 4px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 1000;
    }
  </style>
</head>

<body>
  <div id="container">
    <div id="tooltip"></div>
  </div>

  <!-- Load D3.js -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <!-- Load your treemap code -->
  <script src="scripts/treemap-d3js-v7.js"></script>
</body>

</html>
